<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="grad1" x1="100%" y1="0%" x2="50%" y2="50%">
      <stop offset="0%" stop-color="#E60000" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#050505" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="100%" x2="50%" y2="50%">
      <stop offset="0%" stop-color="#009933" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#050505" stop-opacity="0" />
    </linearGradient>
  </defs>
  
  <!-- Background Container -->
  <rect x="0" y="0" width="64" height="64" rx="16" fill="#050505" />
  
  <!-- Red Glow Top Right -->
  <rect x="0" y="0" width="64" height="64" rx="16" fill="url(#grad1)" />
  
  <!-- Green Glow Bottom Left -->
  <rect x="0" y="0" width="64" height="64" rx="16" fill="url(#grad2)" />
  
  <!-- Border -->
  <rect x="1" y="1" width="62" height="62" rx="15" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2" />
  
  <!-- The "R" -->
  <text x="50%" y="50%" dx="-2" dy="5" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-style="italic" font-size="42" fill="white">R</text>
</svg>